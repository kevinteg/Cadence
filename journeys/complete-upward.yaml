name: Complete with Upward Completion
description: Verify /complete marks actions done and triggers upward completion when all DoD items are checked

setup:
  - create_pursuit:
      id: test-complete
      type: finite
      status: active
  - create_project:
      pursuit: test-complete
      id: test-complete-project
      title: Test Complete Project
      intent: |
        Walk the upward-completion flow: complete a project's only
        action, confirm the agent fires the new "Does the intent feel
        achieved?" prompt, accept completion, and verify the project
        transitions to status: done.
      actions:
        - Do the only thing

steps:
  - command: /start test-complete-project
    assert:
      - contains: "test-complete-project"

  - command: /complete Do the only thing
    assert:
      - file_contains:
          path: pursuits/test-complete/projects/test-complete-project.md
          pattern: "- [x] Do the only thing"
      - contains: "Done"
      - contains: "Does the intent feel achieved"

  - action: User says "complete it"
    assert:
      - file_contains:
          path: pursuits/test-complete/projects/test-complete-project.md
          pattern: "status: done"
      - contains: "Complete this pursuit"

  - action: User says "complete it" (pursuit-level)
    assert:
      - file_contains:
          path: pursuits/_archived/test-complete/pursuit.md
          pattern: "status: archived"

teardown:
  - delete_files:
      - pursuits/test-complete/
      - pursuits/_archived/test-complete/
  - assert_clean: pursuits/test-complete/
  - assert_clean: pursuits/_archived/test-complete/
