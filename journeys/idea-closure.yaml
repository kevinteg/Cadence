name: Idea Closure
description: Verify the closure ritual — /close blocks on unresolved Ideas, succeeds after resolution

setup:
  - create_pursuit:
      id: test-closure
      type: finite
      status: active
  - create_idea:
      pursuit: test-closure
      id: seed-idea
      title: Seed Idea
      state: seed
  - create_idea:
      pursuit: test-closure
      id: developed-idea
      title: Developed Idea
      state: developed

steps:
  - command: /close test-closure
    assert:
      - contains: "unresolved"
      - not_contains: "archived"

  - action: Close seed-idea with reason "not relevant" and developed-idea with reason "out of scope"
    assert:
      - file_contains:
          path: pursuits/test-closure/ideas/seed-idea.md
          pattern: "state: closed"
      - file_contains:
          path: pursuits/test-closure/ideas/seed-idea.md
          pattern: "closed_reason"
      - file_contains:
          path: pursuits/test-closure/ideas/developed-idea.md
          pattern: "state: closed"
      - file_contains:
          path: pursuits/test-closure/ideas/developed-idea.md
          pattern: "closed_reason"

  - command: /close test-closure
    assert:
      - not_contains: "unresolved"
      - contains: "archived"

teardown:
  - delete_files:
      - pursuits/test-closure/
  - assert_clean: pursuits/test-closure/
