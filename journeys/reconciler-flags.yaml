name: Reconciler Flags
description: Verify /status detects overdue waiting-for, dormant projects, stale markers, and the unified structural flag (active project with no unchecked actions — collapsed from three legacy DoD-based structural flags into one)

setup:
  - create_pursuit:
      id: test-reconciler
      type: finite
      status: active
  - create_project:
      pursuit: test-reconciler
      id: overdue-waiting
      title: Overdue Waiting Project
      intent: |
        Project deliberately blocked on a waiting_for item that has
        passed its expected date. Should fire the overdue_waiting_for
        reconciler flag.
      actions:
        - Follow up with Alice
      waiting_for:
        - person: Alice
          what: API access credentials
          expected: 2026-04-10
          flagged: false
  - create_project:
      pursuit: test-reconciler
      id: dormant-project
      title: Dormant Project
      created: 2026-03-01
      intent: |
        Project created weeks ago with no commit activity since.
        Should fire the dormant_project flag.
      actions:
        - Write the code
  - create_project:
      pursuit: test-reconciler
      id: all-actions-checked
      title: All Actions Checked Not Closed
      intent: |
        Project where every action is checked but status is still
        active. Should fire structural_active_no_open_actions
        ("does the intent feel achieved?").
      actions:
        - item: Do first thing
          checked: true
        - item: Do second thing
          checked: true
  - create_project:
      pursuit: test-reconciler
      id: empty-actions
      title: No Actions Left
      intent: |
        Project with zero actions in the section. Same flag as
        all-actions-checked — both reduce to "no unchecked actions"
        on an active project under the collapsed flag model.
      actions: []

steps:
  - command: /status
    assert:
      - contains: "Alice"
      - contains: "overdue"
      - contains: "dormant"
      - contains: "all-actions-checked"
      - contains: "empty-actions"
      - contains: "intent feel achieved"
      - not_contains: "No flags"

teardown:
  - delete_files:
      - pursuits/test-reconciler/
  - assert_clean: pursuits/test-reconciler/
