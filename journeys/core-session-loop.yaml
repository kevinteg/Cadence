name: Core Session Loop
description: Verify /start → work → /pause → /start resumes correctly with auto-recap from marker

setup:
  - create_pursuit:
      id: test-journeys
      type: finite
      status: active
  - create_project:
      pursuit: test-journeys
      id: test-journey-project
      title: Test Journey Project
      dod:
        - First task complete
        - Second task complete
      actions:
        - Do the first thing
        - Do the second thing

steps:
  - command: /start test-journey-project
    assert:
      - contains: "test-journey-project"
      - contains: "Do the first thing"

  - action: Check off "Do the first thing" on the project
    assert:
      - file_contains:
          path: pursuits/test-journeys/projects/test-journey-project.md
          pattern: "- [x] Do the first thing"

  - command: /pause
    assert:
      - file_created:
          path: pursuits/test-journeys/sessions/*.md
          frontmatter:
            project: test-journey-project
      - file_contains:
          path: pursuits/test-journeys/sessions/*.md
          pattern: "Where"
      - file_contains:
          path: pursuits/test-journeys/sessions/*.md
          pattern: "Next"

  - command: /start test-journey-project
    assert:
      - contains: "Next:"
      - contains: "Do the second thing"

teardown:
  - delete_files:
      - pursuits/test-journeys/
  - assert_clean: pursuits/test-journeys/
