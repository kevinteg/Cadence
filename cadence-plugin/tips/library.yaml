    frequency: { cool_down_days: 30 }

  - id: epstein-flexible-knowledge
    type: quote
    content: |
      "Knowledge with enduring utility must be very flexible." Tag by
      concept, not just by Project.
    attribution: David Epstein, Range
    triggers: [ritual-reflect-get-focused]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: epstein-hypercorrection
    type: quote
    content: |
      "The more confident a learner is of their wrong answer, the
      better the information sticks when they subsequently learn the
      right answer."
    attribution: David Epstein, Range
    triggers: [ritual-reflect-get-clear]
    tone: framing
    frequency: { cool_down_days: 30 }

  # ============================================================
  # O. Measuring at Personal Scale
  # ============================================================

  - id: doerr-aspirational-vs-committed
    type: quote
    content: |
      Aspirational vs. committed OKRs. The aspirational expects ~50%
      completion as success.
    attribution: John Doerr, Measure What Matters
    triggers: [verb-promote-pursuit]
    tone: structural
    frequency: { cool_down_days: 30 }

  - id: doerr-stretch-goals-crushing
    type: quote
    content: |
      "Stretch goals can be crushing if people don't believe they're
      achievable." Calibrate to recent throughput.
    attribution: John Doerr, Measure What Matters
    triggers: [ritual-reflect-get-focused]
    tone: diagnostic
    frequency: { cool_down_days: 21 }

  - id: doerr-decouple-measurement-compensation
    type: quote
    content: |
      Decouple measurement from compensation. Don't tie self-worth
      to KR completion. "What did this teach you?" before "Did you
      hit it?"
    attribution: paraphrase of John Doerr, Measure What Matters
    triggers: [ritual-pursuit-close]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: doerr-contributors-engaged
    type: quote
    content: |
      "Contributors are most engaged when they can actually see how
      their work contributes."
    attribution: John Doerr, Measure What Matters
    triggers: [verb-narrate, idle]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: clear-habit-tracking
    type: quote
    content: |
      "Habit tracking… keeps your eyes on the ball: you're focused on
      the process rather than the result."
    attribution: James Clear, Atomic Habits
    triggers: [verb-narrate]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: clear-measurement-context
    type: quote
    content: |
      "Measurement is only useful when it guides you and adds context
      to a larger picture, not when it consumes you."
    attribution: James Clear, Atomic Habits
    triggers: [idle]
    tone: framing
    frequency: { cool_down_days: 30 }

  # ============================================================
  # P. Loading-Screen one-liners (unique entries not folded into A-O)
  # ============================================================

  - id: capture-now-clarify-later
    type: quote
    content: |
      Capture now; clarify later. The captures inbox is cheaper than
      your working memory.
    attribution: distilled
    triggers: [verb-capture, idle]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: first-action-not-plan-x
    type: quote
    content: |
      The first action is never "Plan X." It's "Open editor at file Y."
    attribution: distilled (after Allen)
    triggers: [verb-promote-action, verb-develop]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: diverge-converge-dont-blend
    type: quote
    content: |
      Diverge first. Converge second. Don't blend them.
    attribution: distilled (after Puccio)
    triggers: [verb-brainstorm, idle]
    tone: structural
    frequency: { cool_down_days: 21 }

  - id: quantity-cheapest-quality
    type: quote
    content: |
      Quantity is the cheapest form of quality — generate more, then
      prune.
    attribution: distilled (after Puccio)
    triggers: [verb-brainstorm]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: doubling-not-pessimism
    type: quote
    content: |
      Doubling your estimate isn't pessimism — it's calibration.
    attribution: distilled (after Newport)
    triggers: [verb-promote-project]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: calendar-task-list
    type: quote
    content: |
      Calendar your task list; add the good stuff first.
    attribution: distilled (after Bentley)
    triggers: [ritual-reflect-get-focused]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: externalize-thought-before-debate
    type: quote
    content: |
      Externalize the thought before you debate the thought.
    attribution: distilled (after Paul)
    triggers: [verb-brainstorm, verb-develop]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: ship-shutdown-actually-shut-down
    type: quote
    content: |
      Ship your shutdown ritual. Then actually shut down.
    attribution: distilled (after Newport)
    triggers: [moment-end-of-day]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: late-specialization
    type: quote
    content: |
      Late specialization is fine. Sample first.
    attribution: distilled (after Epstein)
    triggers: [verb-promote-pursuit]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: hard-leads-to-fun
    type: quote
    content: |
      Hard leads to fun.
    attribution: Cal Newport
    triggers: [verb-start, idle]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: friction-protecting-blocks
    type: quote
    content: |
      Friction is a feature when it's protecting work blocks.
    attribution: distilled
    triggers: [verb-start]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: big-things-small-beginnings
    type: quote
    content: |
      Big things from small beginnings — every Pursuit started as a
      captured thought.
    attribution: distilled
    triggers: [idle, verb-capture]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: compress-helmsman-signal
    type: quote
    content: |
      Compress agent output into helmsman-grade signal. Skip the foam.
    attribution: distilled
    triggers: [verb-narrate]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: first-sentence-answers
    type: quote
    content: |
      The first sentence answers the question. Everything else supports
      it.
    attribution: distilled (after Sullivan)
    triggers: [verb-narrate]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: illuminator-of-own-work
    type: quote
    content: |
      Be an illuminator of your own work — not a diminisher.
    attribution: distilled (after Brooks)
    triggers: [ritual-reflect-get-focused]
    tone: framing
    frequency: { cool_down_days: 21 }

  # ============================================================
  # Skill-teaching tooltips (verb discovery + capture explainer)
  # ============================================================

  - id: resolve-verb-discovery
    type: skill-teaching
    content: |
      Running `/cadence:resolve` — this marks projects done. Next time,
      type `/resolve <project>` directly.
    triggers: [discovery]
    tone: directive
    weight: high
    frequency: { cool_down_minutes: 30, cool_down_days: 1 }

  - id: capture-flow-safe-explainer
    type: skill-teaching
    content: |
      `/capture` is flow-safe — the agent saves your thought silently
      and doesn't respond. Triage happens at your next `/reflect`.
    triggers: [verb-capture]
    tone: structural
    frequency: { cool_down_days: 7, lifetime_max: 5 }

  - id: brainstorm-explainer
    type: skill-teaching
    content: |
      `/cadence:brainstorm` deals provocation cards from the deck and
      asks questions — the ideas come from you, not the agent. Quantity
      first; the cliff is around 12 ideas, the original ones often
      come after.
    triggers: [verb-brainstorm]
    tone: structural
    frequency: { cool_down_days: 14, lifetime_max: 5 }

  - id: develop-explainer
    type: skill-teaching
    content: |
      `/cadence:develop` runs PPCo (Praise / Potentials / Concerns /
      Overcome) on Ideas. This is the convergent pass — it can kill
      an Idea respectfully with a reason worth remembering.
    triggers: [verb-develop]
    tone: structural
    frequency: { cool_down_days: 14, lifetime_max: 5 }

  - id: reflect-phase2-interactive
    type: skill-teaching
    content: |
      In Phase 2 of `/reflect`, the agent asks open questions first.
      Take your time — your answers are the reflection, not anything
      pre-filled.
    triggers: [ritual-reflect-get-focused]
    tone: structural
    frequency: { cool_down_days: 14, lifetime_max: 5 }

