# Cadence Tip Library
# Schema reference: cadence-plugin/cadence-reference.md "Tip Library" section
# Editor's guide: cadence-plugin/tips/README.md
# Source material: docs/teaching-tips-research.md (227-entry curated library)
#
# Migration of curated content from the research doc.
# Tone target: smart-colleague-marginalia, never motivational-poster.
# Triggers are precise on purpose — the failure mode is the right quote
# in the wrong context, not having too few quotes.

version: 1

tips:

  # ============================================================
  # A. Setting the Why — Pursuit-level framing
  # ============================================================

  - id: sinek-golden-circle
    type: quote
    content: |
      "People don't buy WHAT you do; they buy WHY you do it."
    attribution: Simon Sinek, Start with Why
    triggers: [verb-promote-pursuit]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: sinek-why-precedes-how
    type: quote
    content: |
      The inspired order is Why → How → What. The limbic brain decides;
      the neocortex justifies.
    attribution: paraphrase of Simon Sinek, Start with Why
    triggers: [verb-promote-pursuit]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: sinek-why-decays
    type: quote
    content: |
      A Pursuit without a clear Why decays into busywork.
    attribution: paraphrase of Simon Sinek, Start with Why
    triggers: [state-stale-pursuit-why, ritual-pursuit-review]
    tone: diagnostic
    frequency: { cool_down_days: 30 }

  - id: doerr-ideas-execution
    type: quote
    content: |
      "Ideas are easy. Execution is everything."
    attribution: John Doerr, Measure What Matters
    triggers: [state-no-actions-this-week, ritual-reflect-get-clear, idle]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: doerr-stretch
    type: quote
    content: |
      "If you're certain you're going to nail it, you're probably not
      pushing hard enough."
    attribution: John Doerr, Measure What Matters
    triggers: [verb-promote-pursuit, ritual-reflect-get-focused]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: grove-less-is-more
    type: quote
    content: |
      "A few extremely well-chosen objectives impart a clear message
      about what we say 'yes' to and what we say 'no' to."
    attribution: Andy Grove (via John Doerr, Measure What Matters)
    triggers: [state-wip-over-limit, verb-promote-pursuit]
    tone: diagnostic
    frequency: { cool_down_days: 14 }

  - id: dewey-reflection-beats-experience
    type: quote
    content: |
      "We do not learn from experience . . . we learn from reflecting
      on experience."
    attribution: John Dewey (via John Doerr, Measure What Matters)
    triggers: [ritual-reflect-get-focused, ritual-pursuit-close, idle]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: sinek-why-survives
    type: quote
    content: |
      A clear Why survives the founder leaving. Could a stranger
      continue this Pursuit from your notes?
    attribution: paraphrase of Simon Sinek, Start with Why
    triggers: [ritual-pursuit-review]
    tone: diagnostic
    frequency: { cool_down_days: 30 }

  - id: newport-mission-reduction
    type: quote
    content: |
      "Any attempt to succeed with our first principle of slow
      productivity must begin with the reduction of your main objectives."
    attribution: Cal Newport, Slow Productivity
    triggers: [ritual-pursuit-review, state-wip-over-limit]
    tone: framing
    frequency: { cool_down_days: 21 }

  # ============================================================
  # B. Capturing Intent — before project work or an action
  # ============================================================

  - id: allen-mind-for-ideas
    type: quote
    content: |
      "Your mind is for having ideas, not holding them."
    attribution: David Allen, Getting Things Done
    triggers: [verb-capture, moment-long-agent-run, idle]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: allen-two-minute-rule
    type: quote
    content: |
      The two-minute rule: if it takes less than two minutes, do it now.
      Otherwise capture, defer, or delegate.
    attribution: David Allen, Getting Things Done
    triggers: [verb-capture, ritual-reflect-get-clear]
    tone: structural
    frequency: { cool_down_days: 14 }

  - id: allen-mind-off-mind
    type: quote
    content: |
      "You must use your mind to get things off your mind."
    attribution: David Allen, Getting Things Done
    triggers: [verb-capture, ritual-reflect-get-clear]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: allen-mind-like-water
    type: quote
    content: |
      Mind like water — a relaxed mind that responds proportionally to
      input "doesn't overreact or underreact."
    attribution: David Allen, Getting Things Done
    triggers: [ritual-reflect-get-clear]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: allen-open-loops
    type: quote
    content: |
      "As soon as you have two things to do stored in your RAM, you've
      generated personal failure."
    attribution: David Allen, Getting Things Done
    triggers: [verb-capture, verb-start]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: allen-next-action
    type: quote
    content: |
      "What is the very next physical, visible action required?"
    attribution: David Allen, Getting Things Done
    triggers: [verb-promote-action, verb-develop]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: sullivan-audience-first
    type: quote
    content: |
      "It's not about you, it's all about the value you can provide to
      others." Define who/what the artifact serves before generating it.
    attribution: Jay Sullivan, Simply Said
    triggers: [verb-narrate, moment-long-agent-run]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: sullivan-one-sentence
    type: quote
    content: |
      One sentence, fewer than ten words — Sullivan's rule for the
      core message. Find the kernel before expanding the narrative.
    attribution: Jay Sullivan, Simply Said
    triggers: [verb-promote-project]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: sullivan-most-important-first
    type: quote
    content: |
      Most-important-info-first: main concept → key points →
      fundamental takeaways.
    attribution: Jay Sullivan, Simply Said
    triggers: [verb-narrate]
    tone: structural
    frequency: { cool_down_days: 21 }

  - id: sullivan-key-takeaway
    type: quote
    content: |
      "Ask yourself, 'what's the one key takeaway I want everyone to
      leave with?'"
    attribution: Jay Sullivan, Simply Said
    triggers: [verb-start, verb-promote-project]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: allen-clarify-before-generate
    type: quote
    content: |
      "Most people have a resistance to initiating the burst of energy
      that it will take to clarify the real meaning… of something they
      have let into their world."
    attribution: David Allen, Getting Things Done
    triggers: [verb-capture, verb-start]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: twain-clear-next-step
    type: quote
    content: |
      "The secret of getting started is breaking your complex
      overwhelming tasks into small, manageable tasks."
    attribution: Mark Twain (via David Allen, GTD)
    triggers: [verb-promote-action, verb-develop]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: allen-think-about-not-of
    type: quote
    content: |
      Use your mind to think *about* things, not *of* them.
    attribution: David Allen, Getting Things Done
    triggers: [ritual-reflect-get-clear]
    tone: framing
    frequency: { cool_down_days: 21 }

  # ============================================================
  # C. Diverge / Explore — opening the solution space
  # ============================================================

  - id: puccio-four-principles
    type: quote
    content: |
      Diverge: defer judgment, go for quantity, make connections,
      seek novelty.
    attribution: Gerard Puccio, The Creative Thinker's Toolkit (Lect. 5)
    triggers: [verb-brainstorm]
    tone: structural
    frequency: { cool_down_days: 14 }

  - id: puccio-combining-opposites
    type: quote
    content: |
      Diverge then converge. Switch modes deliberately; don't blend them.
    attribution: Gerard Puccio, The Creative Thinker's Toolkit (Lect. 4)
    triggers: [verb-brainstorm, verb-develop]
    tone: structural
    frequency: { cool_down_days: 14 }

  - id: puccio-lateral-thinking-survival
    type: quote
    content: |
      Lateral thinking is a survival skill. When stuck on a Project,
      try a Diverge pass on a sibling.
    attribution: Gerard Puccio, The Creative Thinker's Toolkit (Lect. 2)
    triggers: [verb-brainstorm, state-stuck]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: kirton-adaptors-innovators
    type: quote
    content: |
      Adaptors do better; Innovators do differently. Which kind of move
      is this Project — better, or different?
    attribution: Kirton (via Puccio, The Creative Thinker's Toolkit)
    triggers: [verb-promote-project]
    tone: diagnostic
    frequency: { cool_down_days: 21 }

  - id: epstein-sampling-period
    type: quote
    content: |
      Sample first, specialize later. Encourage one exploratory Pursuit
      alongside the focused ones.
    attribution: David Epstein, Range
    triggers: [ritual-pursuit-review]
    tone: diagnostic
    frequency: { cool_down_days: 30 }

  - id: yokoi-withered-technology
    type: quote
    content: |
      "Lateral thinking with withered technology." Old tools, new uses.
    attribution: Gunpei Yokoi (via David Epstein, Range)
    triggers: [state-stuck, verb-brainstorm, idle]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: ibarra-test-and-learn
    type: quote
    content: |
      "Test-and-learn, not plan-and-implement." Act first; label later.
    attribution: Herminia Ibarra (via David Epstein, Range)
    triggers: [verb-promote-pursuit, ritual-pursuit-review]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: dyson-birds-frogs
    type: quote
    content: |
      Visionary birds see horizons; focused frogs solve problems one at
      a time. Pick a mode for this work.
    attribution: Freeman Dyson (via David Epstein, Range)
    triggers: [verb-narrate, verb-start]
    tone: diagnostic
    frequency: { cool_down_days: 21 }

  - id: epstein-wicked-vs-kind
    type: quote
    content: |
      In kind environments specialization wins; in wicked ones,
      generalists do. Is this Project kind or wicked?
    attribution: David Epstein, Range
    triggers: [verb-promote-project, ritual-reflect-get-focused]
    tone: diagnostic
    frequency: { cool_down_days: 30 }

  - id: epstein-analogical-thinking
    type: quote
    content: |
      "Deep analogical thinking… recognizing conceptual similarities in
      multiple domains." What is this Project like?
    attribution: David Epstein, Range
    triggers: [verb-brainstorm]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: paul-think-with-heads
    type: quote
    content: |
      "What if we don't just think with our heads?" Externalize before
      deciding.
    attribution: paraphrase of Annie Murphy Paul, The Extended Mind
    triggers: [verb-brainstorm, idle]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: paul-externalize-to-iterate
    type: quote
    content: |
      "Whenever possible, we should endeavor to transform information
      into an artifact… and then proceed to interact with it."
    attribution: Annie Murphy Paul, The Extended Mind
    triggers: [verb-brainstorm, verb-develop]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: paul-sketches-talk-back
    type: quote
    content: |
      Sketches "talk back." Make the artifact, then let it iterate
      with you.
    attribution: Annie Murphy Paul, The Extended Mind
    triggers: [ritual-reflect-get-clear, verb-brainstorm]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: puccio-quantity-quality
    type: quote
    content: |
      Quantity is a quality strategy. We have 3 options — want 7?
    attribution: Gerard Puccio, The Creative Thinker's Toolkit
    triggers: [verb-brainstorm]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: epstein-wander-off
    type: quote
    content: |
      "A paradox of innovation and mastery is that breakthroughs often
      occur when you start down a road, but wander off."
    attribution: David Epstein, Range
    triggers: [ritual-reflect-get-focused]
    tone: framing
    frequency: { cool_down_days: 30 }

  # ============================================================
  # D. Converge / Decide — narrowing and committing
  # ============================================================

  - id: puccio-affirmative-judgment
    type: quote
    content: |
      Practice affirmative judgment in convergence: not "no, because…"
      but "yes, if…"
    attribution: Gerard Puccio, The Creative Thinker's Toolkit (Lect. 6)
    triggers: [verb-develop]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: puccio-novelty-in-convergence
    type: quote
    content: |
      Don't let convergence kill the most interesting option. Mark
      one wild card before pruning.
    attribution: Gerard Puccio, The Creative Thinker's Toolkit
    triggers: [verb-develop]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: newport-deciding-not-to-do
    type: quote
    content: |
      "Deciding what not to do is as important as deciding what to do."
    attribution: Cal Newport, Slow Productivity
    triggers: [ritual-reflect-get-focused, ritual-pursuit-review]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: doerr-focus-everything-nothing
    type: quote
    content: |
      "If we try to focus on everything, we focus on nothing."
    attribution: John Doerr, Measure What Matters
    triggers: [state-wip-over-limit, ritual-reflect-get-focused]
    tone: diagnostic
    frequency: { cool_down_days: 14 }

  - id: page-wood-fewer-arrows
    type: quote
    content: |
      "Put more wood behind fewer arrows."
    attribution: Larry Page (via John Doerr, Measure What Matters)
    triggers: [ritual-reflect-get-focused, idle]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: jobs-hire-smart
    type: quote
    content: |
      "Hire smart people so they can tell us what to do." Brief
      outcomes to your agents, not procedures.
    attribution: Steve Jobs (via John Doerr, Measure What Matters)
    triggers: [moment-long-agent-run]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: bentley-leveraged-priority
    type: quote
    content: |
      Pick the priority that "acts as a force multiplier" — reducing
      work this week and the next quarter.
    attribution: Demir Bentley, Winning the Week
    triggers: [ritual-reflect-get-focused]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: bentley-daily-list-trap
    type: quote
    content: |
      "The daily to-do list is where high-impact tasks go to die."
      Plan the week.
    attribution: Demir Bentley, Winning the Week
    triggers: [ritual-reflect-get-focused, idle]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: bentley-triage-ruthlessly
    type: quote
    content: |
      Triage to three buckets only: do, defer, delete.
    attribution: Demir Bentley, Winning the Week
    triggers: [ritual-reflect-get-clear]
    tone: structural
    frequency: { cool_down_days: 14 }

  - id: horowitz-roll-hard-six
    type: quote
    content: |
      "Roll a hard six." Wartime acceptance: there's no contingency.
      Name the chosen risk explicitly.
    attribution: Ben Horowitz, The Hard Thing About Hard Things
    triggers: [state-stuck, ritual-reflect-get-focused]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: horowitz-10-percent-info
    type: quote
    content: |
      "At the time of any given decision, the CEO will generally have
      less than 10 percent of the information." Record assumptions
      explicitly.
    attribution: Ben Horowitz, The Hard Thing About Hard Things
    triggers: [verb-promote-project, verb-develop]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: newport-single-project-day
    type: quote
    content: |
      "Work on at most one project per day."
    attribution: Cal Newport, Slow Productivity
    triggers: [verb-start, ritual-reflect-get-focused]
    tone: directive
    frequency: { cool_down_days: 14 }

  - id: puccio-convergence-commitment
    type: quote
    content: |
      Convergence is commitment. End converge work with a commit-
      message-style summary.
    attribution: Gerard Puccio, The Creative Thinker's Toolkit
    triggers: [verb-develop, verb-resolve]
    tone: structural
    frequency: { cool_down_days: 21 }

  # ============================================================
  # E. Steering the Stream — human-in-the-loop on agentic work
  # ============================================================

  - id: karpathy-leash
    type: quote
    content: |
      Keep AI on the leash; you're still the bottleneck.
    attribution: Andrej Karpathy, YC AI Startup School keynote (June 2025)
    triggers: [moment-long-agent-run, ritual-pursuit-close]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: karpathy-bottleneck-visible
    type: quote
    content: |
      "I'm still the bottleneck." Make the verification queue visible,
      not hidden.
    attribution: Andrej Karpathy, YC AI Startup School keynote (June 2025)
    triggers: [moment-long-agent-run, ritual-reflect-get-clear]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: karpathy-iron-man-suit
    type: quote
    content: |
      Iron Man suit, not Iron Man robot — partial-autonomy products
      with the human still in the loop.
    attribution: Andrej Karpathy
    triggers: [verb-promote-project]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: willison-llm-tools-loop
    type: quote
    content: |
      "An LLM agent runs tools in a loop to achieve a goal. The art
      of using them well is to carefully design the tools and loop."
    attribution: Simon Willison, "Designing agentic loops" (Sept 2025)
    triggers: [verb-start, moment-long-agent-run]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: willison-wrecking-environment
    type: quote
    content: |
      "An AI agent is an LLM wrecking its environment in a loop."
      Use the worktree.
    attribution: Simon Willison
    triggers: [moment-long-agent-run, verb-start]
    tone: framing
    frequency: { cool_down_days: 14 }

  - id: willison-brute-force-search
    type: quote
    content: |
      Coding agents are brute-force search. The human's job is curation.
      The narrate step summarizes search, not keystrokes.
    attribution: paraphrase of Simon Willison
    triggers: [verb-narrate, moment-long-agent-run]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: on-the-loop
    type: quote
    content: |
      Move from "in the loop" to "on the loop." Steer and oversee
      rather than approving each step.
    attribution: industry framing (Karpathy-adjacent, 2025-26)
    triggers: [ritual-reflect-get-clear, idle]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: willison-orchestrated-monsters
    type: quote
    content: |
      "With an orchestrated army of agents… you have removed yourself
      from the loop, so you don't even know that all the innocent
      booboos have formed a monster."
    attribution: Simon Willison
    triggers: [moment-long-agent-run, ritual-reflect-get-focused]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: litt-code-like-surgeon
    type: quote
    content: |
      Code like a surgeon. Stay in the loop for the critical incision;
      let agents do prep and grunt work.
    attribution: Geoffrey Litt
    triggers: [verb-start, moment-long-agent-run]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: helmsman-not-hostage
    type: quote
    content: |
      Helmsman, not hostage. A helmsman feels the wind and the wheel;
      a hostage just watches the feed.
    attribution: distilled
    triggers: [verb-narrate]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: beer-cybernetic-steering
    type: quote
    content: |
      Cybernetic steering: the human is the meta-controller of agent
      loops, intervening only on dashboard violations.
    attribution: Stafford Beer (Viable Systems Model, adapted)
    triggers: [idle]
    tone: framing
    weight: low
    frequency: { cool_down_days: 30 }

  - id: attention-salience-not-recency
    type: quote
    content: |
      Attention triage by salience, not recency. The most recent agent
      token shouldn't win your attention by default.
    attribution: distilled
    triggers: [verb-narrate, moment-long-agent-run]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: verification-new-craft
    type: quote
    content: |
      When generation is cheap, the scarce skill is judging output.
      Verification is the new craft.
    attribution: distilled
    triggers: [ritual-reflect-get-clear]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: review-every-assumption
    type: quote
    content: |
      Don't review every line — review every assumption.
    attribution: practitioner heuristic
    triggers: [verb-resolve, ritual-reflect-get-clear]
    tone: directive
    frequency: { cool_down_days: 21 }

  # ============================================================
  # F. Cognitive Ease & Attention Management
  # ============================================================

  - id: kahneman-system-1-2
    type: quote
    content: |
      System 1 (fast, automatic) and System 2 (slow, deliberate) —
      know which is in the chair.
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [idle, verb-narrate]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: kahneman-cognitive-minefield
    type: quote
    content: |
      "Recognize the signs that you are in a cognitive minefield, slow
      down, and ask for reinforcement of system 2."
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [moment-pattern-failed-agent-attempts, state-stuck]
    tone: diagnostic
    frequency: { cool_down_days: 21 }

  - id: kahneman-cognitive-ease-vigilance
    type: quote
    content: |
      Cognitive ease "links… to illusions of truth, pleasant feelings,
      and reduced vigilance." Beware the polished agent answer that's
      wrong.
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [ritual-reflect-get-clear, moment-long-agent-run]
    tone: diagnostic
    frequency: { cool_down_days: 21 }

  - id: kahneman-wysiati
    type: quote
    content: |
      WYSIATI — what you see is all there is. "What's NOT in the
      context window?"
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [verb-develop, verb-promote-project]
    tone: diagnostic
    frequency: { cool_down_days: 21 }

  - id: kahneman-intelligence-attention
    type: quote
    content: |
      "Intelligence is… the ability to find relevant material in memory
      and to deploy attention when needed."
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [idle]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: kahneman-simple-language
    type: quote
    content: |
      "If you care about being thought credible and intelligent, do
      not use complex language where simpler language will do."
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [verb-narrate]
    tone: directive
    frequency: { cool_down_days: 21 }

  - id: kahneman-law-least-effort
    type: quote
    content: |
      Law of least effort: people gravitate to the least demanding
      course. Make the right action also the easy action.
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [ritual-reflect-get-focused]
    tone: structural
    frequency: { cool_down_days: 21 }

  - id: kahneman-anchoring
    type: quote
    content: |
      Anchoring bites: arbitrary first numbers shape later judgment.
      Separate "estimate" from "agent's first guess" before deciding.
    attribution: Daniel Kahneman, Thinking, Fast and Slow
    triggers: [verb-promote-project]
    tone: diagnostic
    frequency: { cool_down_days: 30 }

  - id: paul-brain-offloading
    type: quote
    content: |
      "The human brain is limited in its ability to pay attention,
      limited in facility with abstract concepts, and limited in its
      power to persist." Offloading is competence, not weakness.
    attribution: Annie Murphy Paul, The Extended Mind
    triggers: [verb-capture]
    tone: framing
    frequency: { cool_down_days: 21 }

  - id: paul-cognitively-congenial
    type: quote
    content: |
      "Cognitively congenial situations." Deliberately design your
      space to think well.
    attribution: Annie Murphy Paul, The Extended Mind
    triggers: [idle]
    tone: framing
    frequency: { cool_down_days: 30 }

  - id: paul-movement-breaks
    type: quote
    content: |
      "Moderate-intensity exercise sharpens our mental faculties."
      Walk for ten minutes; the prefrontal cortex thanks you.
    attribution: Annie Murphy Paul, The Extended Mind
